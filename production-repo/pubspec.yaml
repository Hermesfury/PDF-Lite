name: pdf_lite
description: "PDF Lite - PDF Reader & Editor"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # State Management - Riverpod
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # PDF Rendering & Manipulation
  pdf: ^3.11.1
  syncfusion_flutter_pdf: ^28.1.33
  syncfusion_flutter_pdfviewer: ^28.1.33

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # File Handling
  file_picker: ^10.1.7
  image_picker: ^1.1.2
  path_provider: ^2.1.5
  share_plus: ^10.1.4
  path: ^1.9.1
  
  # Utilities
  uuid: ^4.5.1
  intl: ^0.20.2
  equatable: ^2.0.7
  dartz: ^0.10.1
  
dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  
  flutter_lints: ^5.0.0
  mocktail: ^1.0.4
  flutter_launcher_icons: ^0.13.1

# App icon configuration
flutter_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/PDF Lite.png"

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
